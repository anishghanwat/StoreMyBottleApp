version: 0.2

phases:
  pre_build:
    commands:
      - echo Installing dependencies...
      - cd frontend
      - npm ci
      - echo Creating production environment file...
      - |
        cat > .env.production << EOF
        VITE_API_URL=https://api.storemybottle.com
        EOF
  
  build:
    commands:
      - echo Build started on `date`
      - echo Building production bundle...
      - npm run build
      - echo Build completed successfully
  
  post_build:
    commands:
      - echo Syncing to S3...
      - aws s3 sync dist/ s3://$S3_BUCKET_CUSTOMER --delete --cache-control "public, max-age=31536000, immutable"
      - aws s3 cp s3://$S3_BUCKET_CUSTOMER/index.html s3://$S3_BUCKET_CUSTOMER/index.html --metadata-directive REPLACE --cache-control "public, max-age=0, must-revalidate" --content-type "text/html"
      - echo Invalidating CloudFront cache...
      - aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_DIST_ID_CUSTOMER --paths "/*"
      - echo Deployment completed on `date`

artifacts:
  files:
    - '**/*'
  base-directory: frontend/dist
  name: FrontendCustomerArtifact

cache:
  paths:
    - 'frontend/node_modules/**/*'
