name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      
      - name: Run backend tests
        run: |
          cd backend
          python -m pytest test_*.py -v || true
        continue-on-error: true

  deploy:
    name: Deploy to EC2
    needs: test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/StoreMyBottleApp
            
            # Pull latest code
            git pull origin main
            
            # Stop services
            docker-compose -f docker-compose.prod.simple.yml down
            
            # Rebuild and start services
            docker-compose -f docker-compose.prod.simple.yml --env-file .env up -d --build
            
            # Wait for services to be healthy
            sleep 30
            
            # Check if services are running
            docker-compose -f docker-compose.prod.simple.yml ps
            
            # Clean up old images
            docker image prune -f
      
      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Check backend health
            curl -f http://localhost:8000/health || exit 1
            
            echo "✅ Deployment successful!"
      
      - name: Notify on success
        if: success()
        run: |
          echo "🎉 Deployment to EC2 completed successfully!"
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment failed! Check the logs."
